services:
  - type: web
    name: code-watch
    runtime: node
    rootDir: .
    buildCommand: >
      npm install --include=dev &&
      npm install -w server --include=dev &&
      npm install -w client --include=dev &&
      npm run build -w client &&
      cd server && npm rebuild better-sqlite3
    startCommand: node server/src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITLAB_TOKEN
        sync: false
      - key: GITLAB_URL
        value: https://gitlab.com
      - key: GITLAB_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
